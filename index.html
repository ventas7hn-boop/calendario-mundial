<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Interactivo Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        .grid-grupos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1300px; margin: 0 auto; }
        .grupo-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #007bff; }
        .grupo-titulo { font-size: 1.3rem; font-weight: bold; padding-bottom: 8px; margin-bottom: 15px; color: #007bff; border-bottom: 1px solid #eee; }
        .partido { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .partido:last-child { border-bottom: none; }
        .equipo { flex: 1; display: flex; align-items: center; font-size: 0.95rem; }
        .equipo.local { justify-content: flex-end; text-align: right; }
        .equipo.visitante { justify-content: flex-start; text-align: left; }
        .bandera { font-size: 1.4rem; }
        .equipo.local .bandera { margin-left: 8px; order: 2; }
        .equipo.local .nombre-pais { order: 1; }
        .equipo.visitante .bandera { margin-right: 8px; order: 1; }
        .equipo.visitante .nombre-pais { order: 2; }
        .marcador { display: flex; gap: 5px; align-items: center; margin: 0 15px; }
        .marcador input { width: 40px; text-align: center; font-size: 1.1rem; border: 1px solid #ccc; border-radius: 6px; padding: 5px; font-weight: bold; -moz-appearance: textfield; }
        .marcador input::-webkit-outer-spin-button, .marcador input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .grid-grupos { grid-template-columns: 1fr; }
            .equipo { font-size: 0.85rem; }
            .bandera { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <h1>🏆 Fixture Colaborativo - Mundial 2026</h1>
    <div class="grid-grupos" id="fixture-container"></div>

<script>
    // 1. Configuración de tus credenciales de Supabase
    const SUPABASE_URL = 'https://jzahrkfecjeypmbwngus.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_42BHwMk5a5rRgT65iY4JEw_9pFr8bzl';
    
    // Se utiliza '_supabase' para evitar conflictos de declaración de variables
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Diccionario de banderas con emojis reales vinculados a los nombres de la Base de Datos
    const banderas = {
        "México": "🇲🇽", "Sudáfrica": "🇿🇦", "Corea del Sur": "🇰🇷", "República Checa": "🇨🇿",
        "Canadá": "🇨🇦", "Bosnia": "🇧🇦", "Estados Unidos": "🇺🇸", "Paraguay": "🇵🇾",
        "Brasil": "🇧🇷", "Marruecos": "🇲🇦", "Alemania": "🇩🇪", "Argentina": "🇦🇷",
        "Francia": "🇫🇷", "Australia": "🇦🇺", "Egipto": "🇪🇬", "Escocia": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "España": "🇪🇸", "Japón": "🇯🇵", "Nigeria": "🇳🇬", "Ecuador": "🇪🇨",
        "Bélgica": "🇧🇪", "Perú": "🇵🇪", "Irán": "🇮🇷", "Ucrania": "🇺🇦",
        "Portugal": "🇵🇹", "Ghana": "🇬🇭", "Chile": "🇨🇱", "Polonia": "🇵🇱",
        "Italia": "🇮🇹", "Camerún": "🇨🇲", "Uruguay": "🇺🇾", "Turquía": "🇹🇷",
        "Países Bajos": "🇳🇱", "Argelia": "🇩🇿", "Colombia": "🇨🇴", "Austria": "🇦🇹",
        "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Túnez": "🇹🇳", "Croacia": "🇭🇷", "Costa Rica": "🇨🇷",
        "Gales": "🏴󠁧󠁢󠁷󠁬󠁳󠁿", "Arabia Saudita": "🇸🇦", "Suiza": "🇨🇭", "Dinamarca": "🇩🇰",
        "Senegal": "🇸🇳", "Nueva Zelanda": "🇳🇿"
    };

    // 2. Cargar partidos desde la Base de Datos
    async function cargarPartidos() {
        const { data: partidos, error } = await _supabase.from('partidos').select('*').order('id');
        if (partidos) renderizarFixture(partidos);
    }

    function renderizarFixture(partidos) {
        const container = document.getElementById('fixture-container');
        container.innerHTML = '';
        
        const grupos = {};
        partidos.forEach(p => {
            if (!grupos[p.grupo]) grupos[p.grupo] = [];
            grupos[p.grupo].push(p);
        });

        for (const [grupo, listaPartidos] of Object.entries(grupos)) {
            const grupoDiv = document.createElement('div');
            grupoDiv.className = 'grupo-card';
            grupoDiv.innerHTML = `<div class="grupo-titulo">${grupo}</div>`;

            listaPartidos.forEach(p => {
                const bLocal = banderas[p.local] || "🏳️";
                const bVis = banderas[p.visitante] || "🏳️";
                const gLocal = p.goles_local !== null ? p.goles_local : '';
                const gVis = p.goles_visitante !== null ? p.goles_visitante : '';

                const partidoDiv = document.createElement('div');
                partidoDiv.className = 'partido';
                partidoDiv.innerHTML = `
                    <div class="equipo local">
                        <span class="nombre-pais">${p.local}</span>
                        <span class="bandera">${bLocal}</span>
                    </div>
                    <div class="marcador">
                        <input type="number" value="${gLocal}" min="0" onchange="actualizarResultado(${p.id}, 'goles_local', this.value)">
                        <span>-</span>
                        <input type="number" value="${gVis}" min="0" onchange="actualizarResultado(${p.id}, 'goles_visitante', this.value)">
                    </div>
                    <div class="equipo visitante">
                        <span class="bandera">${bVis}</span>
                        <span class="nombre-pais">${p.visitante}</span>
                    </div>
                `;
                grupoDiv.appendChild(partidoDiv);
            });
            container.appendChild(grupoDiv);
        }
    }

    // 3. Guardar el resultado en la base de datos al cambiar el input
    async function actualizarResultado(id, campo, valor) {
        const nuevoValor = valor === '' ? null : parseInt(valor);
        await _supabase.from('partidos').update({ [campo]: nuevoValor }).eq('id', id);
    }

    // 4. Sincronización en Tiempo Real
    _supabase.channel('cambios-fixture')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'partidos' }, payload => {
            cargarPartidos();
        })
        .subscribe();

    window.onload = cargarPartidos;
</script>
</body>
</html>
